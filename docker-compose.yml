version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tutorflow_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tutorflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tutorflow-server/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dbgate:
    image: dbgate/dbgate
    container_name: tutorflow_dbgate
    restart: always
    ports:
      - "8082:3000"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: tutorflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./tutorflow-server
      dockerfile: Dockerfile
    container_name: tutorflow_server
    environment:
      - APP_ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=tutorflow
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tutorflow-server/uploads:/app/uploads
      - ./tutorflow-server/config:/app/config

  client:
    build:
      context: ./tutorflow-client
      dockerfile: Dockerfile
    container_name: tutorflow_client
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      # If SSR needs to talk to server container directly:
      # - API_URL_INTERNAL=http://server:8080
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
